services:
  # Byparr - Scalable Cloudflare bypass service (local build)
  byparr:
    build:
      context: .
      dockerfile: Dockerfile.byparr
    environment:
      - PORT=8191
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/"]
      interval: 20s
      timeout: 8s
      retries: 3
      start_period: 60s
    networks:
      - recorder-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 500M

  # Nginx load balancer for Byparr instances
  byparr-lb:
    image: nginx:alpine
    container_name: byparr-lb
    ports:
      - "8191:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      byparr:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - recorder-network
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/run/nginx.pid || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Chaturbate DVR - Stream recorder (built from gogoqaz fork)
  chaturbate-dvr:
    build: .
    container_name: chaturbate-dvr
    command: ["--port", "8080", "--compress=false"]
    env_file:
      - .env
    environment:
      - FLARESOLVERR_URL=http://byparr-lb/v1
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_API_KEY=${SUPABASE_API_KEY:-}
      - VOESX_API_KEY=${VOESX_API_KEY:-}
      - STREAMTAPE_LOGIN=${STREAMTAPE_LOGIN:-}
      - STREAMTAPE_API_KEY=${STREAMTAPE_API_KEY:-}
      - SENDCM_API_KEY=${SENDCM_API_KEY:-}
      - BYSE_API_KEY=${BYSE_API_KEY:-}
      - PROXY_URL=${PROXY_URL:-${PROXY_SERVER:-}}
      - PROXY_USERNAME=${PROXY_USERNAME:-}
      - PROXY_PASSWORD=${PROXY_PASSWORD:-}
      - COOKIES=${COOKIES:-}
      - USER_AGENT=${USER_AGENT:-}
    ports:
      - "8080:8080"
    volumes:
      - ./videos:/usr/src/app/videos
      - ./database:/database
    depends_on:
      byparr-lb:
        condition: service_started
    restart: unless-stopped
    stop_grace_period: 5m
    networks:
      - recorder-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 200M

networks:
  recorder-network:
    driver: bridge
